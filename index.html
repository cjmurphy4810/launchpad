<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launchpad</title>
<style>
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-dim: #1f6feb;
    --warn: #d29922;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-height: 100vh;
  }
  #gate-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  #gate-overlay.hidden { display: none; }
  .gate-box {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    width: 320px;
    text-align: center;
  }
  .gate-box h2 { margin-top: 0; }
  .gate-box input {
    width: 100%;
    padding: 10px;
    margin: 12px 0;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
  }
  .gate-box button {
    width: 100%;
    padding: 10px;
    background: var(--accent-dim);
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 14px;
    cursor: pointer;
  }
  .gate-box button:hover { background: var(--accent); }
  .gate-error { color: #f85149; font-size: 13px; min-height: 18px; }
  #app { display: none; max-width: 1100px; margin: 0 auto; padding: 32px 20px; }
  #app.visible { display: block; }
</style>
</head>
<body>

<div id="gate-overlay">
  <div class="gate-box">
    <h2 id="gate-title">Enter Password</h2>
    <input type="password" id="gate-input" placeholder="Password" autofocus>
    <div class="gate-error" id="gate-error"></div>
    <button id="gate-button">Unlock</button>
  </div>
</div>

<div id="app"></div>

<script>
const STORAGE_KEY = "launchpad_pw_hash_v1";

async function sha256Hex(str) {
  const enc = new TextEncoder().encode(str);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function unlock() {
  document.getElementById("gate-overlay").classList.add("hidden");
  document.getElementById("app").classList.add("visible");
  if (typeof renderApp === "function") renderApp();
}

async function submitGate() {
  const input = document.getElementById("gate-input");
  const error = document.getElementById("gate-error");
  const value = input.value;
  if (!value) return;
  const storedHash = localStorage.getItem(STORAGE_KEY);

  if (!storedHash) {
    const hash = await sha256Hex(value);
    localStorage.setItem(STORAGE_KEY, hash);
    unlock();
    return;
  }

  const hash = await sha256Hex(value);
  if (hash === storedHash) {
    error.textContent = "";
    unlock();
  } else {
    error.textContent = "Incorrect password.";
    input.value = "";
    input.focus();
  }
}

function initGate() {
  const title = document.getElementById("gate-title");
  const storedHash = localStorage.getItem(STORAGE_KEY);
  title.textContent = storedHash ? "Enter Password" : "Set a Password";

  document.getElementById("gate-button").addEventListener("click", submitGate);
  document.getElementById("gate-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") submitGate();
  });
}

initGate();
</script>
</body>
</html>
